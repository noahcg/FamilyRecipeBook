<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#F7F3E9" />
    <title>Offline Recipes | Home Cooked</title>
    <style>
      :root {
        color-scheme: light;
        --paper: #f7f3e9;
        --card: #fffaf0;
        --ink: #2f2a20;
        --muted: #746c5e;
        --green: #244b35;
        --line: #ddd3bf;
        --honey: #c58b2c;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: var(--paper);
        color: var(--ink);
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        margin: 0 auto;
        max-width: 980px;
        padding: 28px 18px 48px;
      }
      a {
        color: inherit;
      }
      .eyebrow {
        color: var(--honey);
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      h1 {
        color: var(--green);
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(34px, 7vw, 64px);
        line-height: 1;
        margin: 8px 0 12px;
      }
      h2 {
        color: var(--green);
        font-family: Georgia, "Times New Roman", serif;
        font-size: 28px;
        margin: 0 0 14px;
      }
      p {
        color: var(--muted);
        line-height: 1.55;
      }
      .bar {
        align-items: center;
        border-bottom: 1px solid var(--line);
        display: flex;
        justify-content: space-between;
        margin-bottom: 26px;
        padding-bottom: 18px;
        gap: 14px;
      }
      .pill {
        border: 1px solid var(--line);
        border-radius: 999px;
        background: var(--card);
        color: var(--green);
        display: inline-flex;
        font-size: 13px;
        font-weight: 800;
        padding: 9px 13px;
        text-decoration: none;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 14px;
        box-shadow: 0 14px 36px rgba(75, 53, 31, 0.08);
        padding: 18px;
      }
      .list {
        display: grid;
        gap: 12px;
      }
      .row {
        border-bottom: 1px solid var(--line);
        display: block;
        padding: 14px 0;
        text-decoration: none;
      }
      .row:last-child {
        border-bottom: 0;
      }
      .row strong {
        color: var(--ink);
        display: block;
        font-family: Georgia, "Times New Roman", serif;
        font-size: 21px;
      }
      .meta {
        color: var(--muted);
        display: block;
        font-size: 13px;
        margin-top: 5px;
      }
      .grid {
        display: grid;
        gap: 28px;
      }
      @media (min-width: 820px) {
        .grid {
          grid-template-columns: minmax(0, 1fr) 320px;
        }
      }
      li {
        margin-bottom: 9px;
      }
      .step {
        border-bottom: 1px solid var(--line);
        padding: 0 0 16px;
      }
      .empty {
        padding: 44px 18px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <main id="app">
      <p class="eyebrow">Offline</p>
      <h1>Saved recipes</h1>
      <p>Loading recipes saved on this device...</p>
    </main>
    <script>
      const DB_NAME = "home-cooked-offline";
      const STORE_NAME = "recipes";
      const CURRENT_USER_KEY = "home-cooked-offline-user";

      function openDb() {
        return new Promise((resolve, reject) => {
          const request = indexedDB.open(DB_NAME, 1);
          request.onsuccess = () => resolve(request.result);
          request.onerror = () => reject(request.error);
        });
      }

      function getPathParts() {
        const match = location.pathname.match(/\/app\/books\/([^/]+)\/offline(?:\/([^/]+))?/);
        return {
          bookId: match ? decodeURIComponent(match[1]) : null,
          recipeId: match && match[2] ? decodeURIComponent(match[2]) : null,
        };
      }

      function formatDate(value) {
        return new Intl.DateTimeFormat("en", {
          month: "short",
          day: "numeric",
          year: "numeric",
        }).format(new Date(value));
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      async function readRecords() {
        const userId = localStorage.getItem(CURRENT_USER_KEY);
        const db = await openDb();

        return new Promise((resolve, reject) => {
          const transaction = db.transaction(STORE_NAME, "readonly");
          const request = transaction.objectStore(STORE_NAME).getAll();
          request.onsuccess = () => {
            db.close();
            resolve((request.result || []).filter((record) => !userId || record.userId === userId));
          };
          request.onerror = () => {
            db.close();
            reject(request.error);
          };
        });
      }

      function renderList(records, bookId) {
        const app = document.getElementById("app");
        const filtered = records
          .filter((record) => !bookId || record.bookId === bookId)
          .sort((a, b) => String(b.savedAt).localeCompare(String(a.savedAt)));

        app.innerHTML = `
          <div class="bar">
            <div>
              <p class="eyebrow">Offline</p>
              <h1>Saved recipes</h1>
              <p>Recipes saved on this device for view-only access.</p>
            </div>
            <a class="pill" href="/app/books/${escapeHtml(bookId || "")}/recipes">Online recipes</a>
          </div>
          ${
            filtered.length
              ? `<section class="card list">${filtered
                  .map(
                    (record) => `<a class="row" href="/app/books/${encodeURIComponent(record.bookId)}/offline/${encodeURIComponent(record.recipeId)}">
                      <strong>${escapeHtml(record.recipe.title)}</strong>
                      <span class="meta">Saved ${formatDate(record.savedAt)}</span>
                    </a>`
                  )
                  .join("")}</section>`
              : `<section class="card empty"><h2>No offline recipes yet</h2><p>Reconnect, open a recipe, and use Save offline.</p></section>`
          }
        `;
      }

      function renderRecipe(record, bookId) {
        const app = document.getElementById("app");
        const recipe = record.recipe;
        const ingredients = recipe.ingredients || [];
        const instructions = recipe.instructions || [];
        const story = recipe.story || (recipe.stories && recipe.stories[0] && recipe.stories[0].body) || recipe.description || "";

        app.innerHTML = `
          <div class="bar">
            <a class="pill" href="/app/books/${encodeURIComponent(bookId)}/offline">Offline recipes</a>
            <span class="pill">Saved ${formatDate(record.savedAt)}</span>
          </div>
          <p class="eyebrow">${escapeHtml(recipe.category || "Saved offline")}</p>
          <h1>${escapeHtml(recipe.title)}</h1>
          ${story ? `<section class="card"><p>${escapeHtml(story)}</p></section>` : ""}
          <div class="grid" style="margin-top: 28px;">
            <section>
              <h2>How to make it</h2>
              ${
                instructions.length
                  ? instructions
                      .map((step, index) => `<div class="step"><p><strong>${index + 1}.</strong> ${escapeHtml(step.body)}</p></div>`)
                      .join("")
                  : "<p>No steps saved for this recipe.</p>"
              }
            </section>
            <aside class="card">
              <h2>Ingredients</h2>
              ${
                ingredients.length
                  ? `<ul>${ingredients
                      .map((item) => `<li>${escapeHtml([item.quantity, item.unit, item.item].filter(Boolean).join(" "))}</li>`)
                      .join("")}</ul>`
                  : "<p>No ingredients saved for this recipe.</p>"
              }
            </aside>
          </div>
        `;
      }

      readRecords()
        .then((records) => {
          const { bookId, recipeId } = getPathParts();
          if (!recipeId) {
            renderList(records, bookId);
            return;
          }

          const record = records.find((item) => item.recipeId === recipeId && (!bookId || item.bookId === bookId));
          if (record) renderRecipe(record, bookId || record.bookId);
          else renderList(records, bookId);
        })
        .catch(() => {
          document.getElementById("app").innerHTML =
            '<section class="card empty"><h1>Offline recipes unavailable</h1><p>This browser could not read saved recipes.</p></section>';
        });
    </script>
  </body>
</html>
